<!DOCTYPE html>
<html lang="de">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width">

<title>Der Schatz</title>

<link rel="stylesheet" href="./style.css">
<script src="./game.js" defer></script>

<style>

.chest{
font-size:120px;
margin:20px 0;
cursor:pointer;
}

/* CONFETTI */

.confetti{

position:fixed;

width:10px;
height:10px;

z-index:999;

animation:fall 4s linear forwards;

}

@keyframes fall{

0%{
transform:translateY(-20px) rotate(0deg);
}

100%{
transform:translateY(110vh) rotate(720deg);
}

}

.next-box{
margin-top:25px;
}

.next-box button{

padding:16px 28px;
font-size:18px;

border:none;
border-radius:12px;

background:#ffb703;

cursor:pointer;

}

</style>

</head>

<body>

<div class="overlay">

<div class="header">
🏆 Der Schatz des Seehüters
</div>

<div class="card">

<h2>Herzlichen Glückwunsch!</h2>

<p class="story">

Ihr habt alle Prüfungen bestanden  
und den verborgenen Schatz entdeckt!

</p>

<p>

Ihr seid nun offizielle  
<strong>Schatzsucher des Sees</strong>.

</p>

<p>

🎓 Holt euch jetzt eure persönliche Ehrenurkunde.

</p>

<div class="chest" onclick="openChest()">
💰
</div>

<p id="treasureText" class="hidden">

Der Schatz ist geöffnet!  
Jetzt könnt ihr eure Urkunde erhalten.

</p>

<div class="next-box">

<button onclick="goToCertificate()">

🏴‍☠️ Zur Urkunde

</button>

</div>

</div>

</div>

<script>

/* OPEN CHEST */

function openChest(){

document.getElementById("treasureText").classList.remove("hidden");

launchConfetti();

}

/* CONFETTI */

function launchConfetti(){

const colors=["red","yellow","blue","green","orange","purple"];

for(let i=0;i<120;i++){

const c=document.createElement("div");

c.className="confetti";

c.style.background=colors[Math.floor(Math.random()*colors.length)];

c.style.left=Math.random()*100+"vw";

c.style.animationDuration=(3+Math.random()*3)+"s";

document.body.appendChild(c);

}

}

/* GO TO CERTIFICATE */

function goToCertificate(){

window.location.href="urkunde-generator.html";

}

</script>

</body>

</html>
