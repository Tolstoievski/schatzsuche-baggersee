<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Geheime Ehrenurkunde</title>

<link href="https://fonts.googleapis.com/css2?family=Pirata+One&display=swap" rel="stylesheet">

<style>
@page {
  size: A4 landscape;
  margin: 0;
}

body{
  margin:0;
  background:#2f1b0c;
  display:flex;
  justify-content:center;
  align-items:center;
}

/* CERTIFICAT */
.certificate{
  width:297mm;
  height:210mm;
  position:relative;
  box-sizing:border-box;
  padding:35mm;
  background:linear-gradient(#f7e6b5,#e6c98a);
  font-family:'Georgia', serif;
  overflow:hidden;
  border:20px solid #5c3b1e;
}

/* MARGINI ARSE REALISTE */
.certificate::before{
  content:"";
  position:absolute;
  inset:0;
  background:
    radial-gradient(circle at 0% 0%, rgba(0,0,0,0.7), transparent 35%),
    radial-gradient(circle at 100% 0%, rgba(0,0,0,0.7), transparent 35%),
    radial-gradient(circle at 0% 100%, rgba(0,0,0,0.7), transparent 35%),
    radial-gradient(circle at 100% 100%, rgba(0,0,0,0.7), transparent 35%);
  pointer-events:none;
}

/* TITLU AURIU METALIC */
.title{
  font-family:'Pirata One', cursive;
  text-align:center;
  font-size:66px;
  color:#6b4b1c;
  text-shadow:
    1px 1px 0px #d4af37,
    2px 2px 0px rgba(0,0,0,0.25);
}

.subtitle{
  text-align:center;
  font-size:30px;
  margin-bottom:30px;
  letter-spacing:2px;
}

.name{
  text-align:center;
  font-size:56px;
  font-weight:bold;
  margin:30px 0;
  color:#2f1b0c;
}

.text{
  text-align:center;
  font-size:22px;
  line-height:1.8;
}

.footer{
  text-align:center;
  margin-top:40px;
  font-size:20px;
}

/* SIGILIU ROTUND CU ZIMȚI */
.seal{
  position:absolute;
  bottom:40px;
  left:70px;
  width:180px;
  height:180px;
  background:radial-gradient(circle at 30% 30%, #d93a3a, #8b0000);
  border-radius:50%;
  color:white;
  display:flex;
  justify-content:center;
  align-items:center;
  text-align:center;
  font-weight:bold;
  font-size:18px;
  box-shadow:0 0 40px rgba(0,0,0,0.7);
  transform:rotate(-10deg);
}

/* Zimți uniformi în jur */
.seal::before{
  content:"";
  position:absolute;
  inset:-15px;
  background:
    repeating-conic-gradient(
      #8b0000 0deg 6deg,
      #b22222 6deg 12deg
    );
  border-radius:50%;
  z-index:-1;
}

/* Efect relief ceară */
.seal::after{
  content:"";
  position:absolute;
  width:120px;
  height:120px;
  background:radial-gradient(circle at 40% 40%, rgba(255,255,255,0.4), transparent 60%);
  border-radius:50%;
}

/* BUSOLĂ REALISTĂ */
.compass{
  position:absolute;
  top:30px;
  right:60px;
  width:170px;
  opacity:0.95;
}

/* NUMĂR CERTIFICAT */
.certificate-number{
  position:absolute;
  top:25px;
  left:40px;
  font-size:16px;
  font-weight:bold;
}

/* BUTON PRINT */
.print-button{
  position:fixed;
  bottom:20px;
  right:20px;
  padding:14px 22px;
  background:#ffb703;
  border:none;
  border-radius:8px;
  font-weight:bold;
  cursor:pointer;
  font-size:16px;
}

@media print {
  .print-button{
    display:none;
  }
}
</style>
</head>

<body>

<div class="certificate">

<div class="certificate-number" id="certNumber"></div>

<!-- BUSOLĂ REALISTĂ -->
<svg class="compass" viewBox="0 0 200 200">
  <circle cx="100" cy="100" r="95" stroke="#5a3e1b" stroke-width="6" fill="none"/>
  <circle cx="100" cy="100" r="75" stroke="#5a3e1b" stroke-width="2" fill="none"/>
  <line x1="100" y1="5" x2="100" y2="195" stroke="#5a3e1b" stroke-width="2"/>
  <line x1="5" y1="100" x2="195" y2="100" stroke="#5a3e1b" stroke-width="2"/>
  <polygon points="100,30 115,100 100,170 85,100" fill="#8b0000"/>
  <polygon points="100,50 108,100 100,150 92,100" fill="#2f1b0c"/>
  <text x="100" y="20" text-anchor="middle" font-size="18" fill="#5a3e1b">N</text>
  <text x="100" y="195" text-anchor="middle" font-size="18" fill="#5a3e1b">S</text>
  <text x="5" y="105" font-size="18" fill="#5a3e1b">W</text>
  <text x="185" y="105" font-size="18" fill="#5a3e1b">E</text>
</svg>

<div class="seal">
OFFIZIELL<br>BESTÄTIGT
</div>

<div class="title">🏴‍☠️ GEHEIME EHRENURKUNDE</div>
<div class="subtitle">Orden der Hüter des Sees</div>

<div class="text">
Mit Mut, Entschlossenheit und wahrem Entdeckergeist hat
</div>

<div class="name" id="childName">
Bogdan Savin
</div>

<div class="text">
alle Prüfungen des geheimnisvollen Seehüters bestanden<br>
und den verborgenen Schatz am See entdeckt.
</div>

<div class="footer">
Verliehen am: <span id="date"></span><br><br>
Im Namen des Seehüters 🏴‍☠️
</div>

</div>

<button class="print-button" onclick="window.print()">Als PDF speichern</button>

<script>
const params = new URLSearchParams(window.location.search);
const name = params.get("name");
if(name){
  document.getElementById("childName").innerText = name;
}

const today = new Date();
document.getElementById("date").innerText =
  today.toLocaleDateString("de-DE");

let counter = localStorage.getItem("certificateCounter");
if(!counter){ counter = 1; }
else{ counter = parseInt(counter) + 1; }
localStorage.setItem("certificateCounter", counter);

const year = today.getFullYear();
const padded = String(counter).padStart(3, '0');
document.getElementById("certNumber").innerText =
  "Zertifikat Nr: SD-" + year + "-" + padded;
</script>

</body>
</html>
