<!DOCTYPE html>
<html lang="de">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width">

<title>Ehrenurkunde</title>

<link href="https://fonts.googleapis.com/css2?family=Pirata+One&display=swap" rel="stylesheet">

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

<style>

body{
margin:0;
font-family:Georgia,serif;
text-align:center;

background-image:url("pirate-adventure.jpg");
background-size:cover;
background-position:center;
background-attachment:fixed;
}

/* PAGE OVERLAY */

.page-overlay{
background:rgba(255,255,255,0.55);
min-height:100vh;
padding-top:80px;
padding-bottom:40px;
}

/* FORM */

.form-box{

max-width:400px;
margin:auto;

background:white;

padding:30px;

border-radius:12px;

box-shadow:0 8px 20px rgba(0,0,0,0.2);

}

input{

padding:12px;
font-size:18px;
border-radius:8px;
border:1px solid #ccc;
margin:10px;
width:85%;

}

button{

padding:14px 22px;

font-size:16px;

border:none;

border-radius:10px;

background:#ffb703;

cursor:pointer;

}

/* CERTIFICATE */

.certificate{

width:297mm;
height:210mm;

margin:40px auto;

position:relative;

padding:35mm;

box-sizing:border-box;

background-image:url("pirate-adventure.jpg");
background-size:cover;
background-position:center;

border:18px solid #caa64b;

box-shadow:
0 0 0 6px #e8d28a,
0 0 35px rgba(0,0,0,0.6);

display:none;

}

/* PERGAMENT */

.overlay{

position:absolute;
inset:0;

background:rgba(247,230,181,0.6);

}

/* CONTENT */

.content{

position:relative;
z-index:2;

}

/* TITLE */

.title{

font-family:'Pirata One',cursive;

font-size:76px;

color:#080402;

margin-bottom:10px;

}

/* SUBTITLE */

.subtitle{

font-size:34px;

margin-bottom:30px;

color:#140903;

}

/* NAME */

.name{

font-size:66px;

font-weight:bold;

margin:30px 0;

color:#050202;

}

/* TEXT */

.text{

font-size:28px;

line-height:1.8;

color:#140903;

}

/* FOOTER */

.footer{

margin-top:40px;

font-size:26px;

color:#140903;

}

/* BUSOLA */

.compass{

position:absolute;

bottom:15px;
right:40px;

width:180px;

z-index:4;

animation:spin 40s linear infinite;

filter:drop-shadow(0 8px 12px rgba(0,0,0,0.7));

}

/* SIGILIU */

.seal{

position:absolute;

bottom:25px;
left:60px;

width:300px;

z-index:3;

transform:rotate(-10deg);

filter:drop-shadow(0 8px 14px rgba(0,0,0,0.7));

}

/* CERT NUMBER */

.certificate-number{

position:absolute;

top:25px;
left:40px;

font-size:22px;

font-weight:bold;

color:#050202;

z-index:5;

}

@keyframes spin{

0%{transform:rotate(0deg)}
100%{transform:rotate(360deg)}

}

/* DOWNLOAD BUTTON */

.download-button{

display:none;

position:fixed;

bottom:25px;
right:25px;

padding:16px 24px;

font-size:16px;

border:none;

border-radius:10px;

background:#ffb703;

cursor:pointer;

box-shadow:0 6px 14px rgba(0,0,0,0.3);

}

</style>

</head>

<body>

<div class="page-overlay">

<div class="form-box" id="formBox">

<h2>🏴‍☠️ Eure Ehrenurkunde</h2>

<p>

Gebt den Namen des Kindes ein,  
um eure persönliche Urkunde zu erhalten.

</p>

<form id="certificateForm">

<input type="text" id="childname" placeholder="Name des Kindes" required>

<br>

<input type="email" id="email" placeholder="E-Mail der Eltern" required>

<br><br>

<button type="submit">
Urkunde erstellen
</button>

</form>

</div>

<div class="certificate" id="certificate">

<div class="overlay"></div>

<div class="certificate-number" id="certNumber"></div>

<img src="compass.png" class="compass">

<img src="sigiliu.png" class="seal">

<div class="content">

<div class="title">
GEHEIME EHRENURKUNDE
</div>

<div class="subtitle">
Orden der Hüter des Sees
</div>

<div class="text">
Mit Mut und Entdeckergeist hat
</div>

<div class="name" id="childName">
Name
</div>

<div class="text">
alle Prüfungen bestanden  
und den verborgenen Schatz entdeckt.
</div>

<div class="footer">

Verliehen am: <span id="date"></span>

<br><br>

Im Namen des Seehüters

</div>

</div>

</div>

<button id="downloadBtn" class="download-button" onclick="downloadPDF()">
PDF herunterladen
</button>

</div>

<script>

const today=new Date();

document.getElementById("date").innerText=
today.toLocaleDateString("de-DE");

/* CERTIFICATE NUMBER */

let counter=localStorage.getItem("certificateCounter");

if(!counter){
counter=1;
}else{
counter=parseInt(counter)+1;
}

localStorage.setItem("certificateCounter",counter);

const year=today.getFullYear();

const padded=String(counter).padStart(3,'0');

document.getElementById("certNumber").innerText=
"Zertifikat Nr: SD-"+year+"-"+padded;

/* FORM */

document.getElementById("certificateForm")
.addEventListener("submit", async function(e){

e.preventDefault();

const name=document.getElementById("childname").value;
const email=document.getElementById("email").value;

/* SEND EMAIL TO FORMSPREE */

await fetch("https://formspree.io/f/mojnojer",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({
childname:name,
email:email
})

});

/* HIDE FORM */

document.getElementById("formBox").style.display="none";

/* SHOW CERTIFICATE */

document.getElementById("childName").innerText=name;

document.getElementById("certificate").style.display="block";

/* SHOW DOWNLOAD BUTTON */

document.getElementById("downloadBtn").style.display="block";

});

/* PDF DOWNLOAD */

function downloadPDF(){

const element=document.getElementById("certificate");

const opt={
margin:0,
filename:'Ehrenurkunde_'+document.getElementById("childName").innerText+'.pdf',
image:{type:'jpeg',quality:1},
html2canvas:{scale:2},
jsPDF:{unit:'mm',format:'a4',orientation:'landscape'}
};

html2pdf().set(opt).from(element).save();

}

</script>

</body>
</html>
