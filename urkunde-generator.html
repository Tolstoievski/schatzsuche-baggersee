<!DOCTYPE html>
<html lang="de">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width">

<title>Ehrenurkunde</title>

<link href="https://fonts.googleapis.com/css2?family=Pirata+One&display=swap" rel="stylesheet">

<style>

/* PAGE */

body{
margin:0;
font-family:Georgia,serif;
text-align:center;
background:#2f1b0c;
}

/* FORM */

.form-box{

max-width:420px;
margin:80px auto;

background:white;

padding:30px;

border-radius:12px;

box-shadow:0 10px 25px rgba(0,0,0,0.3);

}

input{

padding:12px;
font-size:18px;

border-radius:8px;
border:1px solid #ccc;

margin:10px;

width:85%;

}

button{

padding:14px 24px;

font-size:16px;

border:none;

border-radius:10px;

background:#ffb703;

cursor:pointer;

}

/* CERTIFICATE */

.certificate{

width:1120px;
height:790px;

margin:40px auto;

position:relative;

padding:120px;

box-sizing:border-box;

background-image:url("pirate-adventure.jpg");
background-size:cover;
background-position:center;

border:18px solid #caa64b;

box-shadow:
0 0 0 6px #e8d28a,
0 0 35px rgba(0,0,0,0.6);

display:none;

}

/* PERGAMENT */

.overlay{

position:absolute;
inset:0;

background:rgba(247,230,181,0.6);

}

/* CONTENT */

.content{

position:relative;
z-index:2;

}

/* TITLE */

.title{

font-family:'Pirata One',cursive;

font-size:72px;

color:#080402;

margin-bottom:10px;

}

/* SUBTITLE */

.subtitle{

font-size:34px;

margin-bottom:30px;

color:#140903;

}

/* NAME */

.name{

font-size:64px;

font-weight:bold;

margin:30px 0;

color:#050202;

}

/* TEXT */

.text{

font-size:26px;

line-height:1.8;

color:#140903;

}

/* FOOTER */

.footer{

margin-top:40px;

font-size:24px;

color:#140903;

}

/* BUSOLA */

.compass{

position:absolute;

bottom:10px;
right:15px;

width:170px;

animation:spin 40s linear infinite;

}

@keyframes spin{

0%{transform:rotate(0deg)}
100%{transform:rotate(360deg)}

}

/* SIGILIU */

.seal{

position:absolute;

bottom:35px;
left:60px;

width:220px;

transform:rotate(-10deg);

}

/* CERT NUMBER */

.certificate-number{

position:absolute;

top:25px;
left:40px;

font-size:20px;

font-weight:bold;

color:#050202;

}

/* PRINT BUTTON */

.print-button{

display:none;

position:fixed;

bottom:25px;
right:25px;

padding:16px 24px;

font-size:16px;

border:none;

border-radius:10px;

background:#ffb703;

cursor:pointer;

box-shadow:0 6px 14px rgba(0,0,0,0.3);

}

/* MOBILE VIEW */

@media (max-width:900px){

.certificate{

width:95vw;
height:auto;

padding:40px 20px;

}

.title{
font-size:42px;
}

.subtitle{
font-size:22px;
}

.name{
font-size:36px;
}

.text{
font-size:18px;
}

.footer{
font-size:18px;
}

.compass{
width:90px;
bottom:5px;
right:5px;
}

.seal{
width:120px;
left:10px;
bottom:10px;
}

}

/* PRINT MODE */

@media print{

body{
background:white;
}

.form-box{
display:none;
}

.print-button{
display:none;
}

.certificate{

margin:0;
box-shadow:none;

}

}

</style>

</head>

<body>

<div class="form-box" id="formBox">

<h2>🏴‍☠️ Eure Ehrenurkunde</h2>

<p>
Gebt den Namen des Kindes ein,  
um eure persönliche Urkunde zu erhalten.
</p>

<form id="certificateForm">

<input type="text" id="childname" placeholder="Name des Kindes" required>

<br>

<input type="email" id="email" placeholder="E-Mail der Eltern" required>

<br><br>

<button type="submit">
Urkunde erstellen
</button>

</form>

</div>

<div class="certificate" id="certificate">

<div class="overlay"></div>

<div class="certificate-number" id="certNumber"></div>

<img src="compass.png" class="compass">
<img src="sigiliu.png" class="seal">

<div class="content">

<div class="title">
GEHEIME EHRENURKUNDE
</div>

<div class="subtitle">
Orden der Hüter des Sees
</div>

<div class="text">
Mit Mut und Entdeckergeist hat
</div>

<div class="name" id="childName">
Name
</div>

<div class="text">
alle Prüfungen bestanden  
und den verborgenen Schatz entdeckt.
</div>

<div class="footer">

Verliehen am: <span id="date"></span>

<br><br>

Im Namen des Seehüters

</div>

</div>

</div>

<button class="print-button" id="printBtn" onclick="printCertificate()">
📄 Urkunde als PDF speichern
</button>

<script>

/* DATE */

const today=new Date();

document.getElementById("date").innerText=
today.toLocaleDateString("de-DE");

/* CERTIFICATE NUMBER */

let counter=localStorage.getItem("certificateCounter");

if(!counter){
counter=1;
}else{
counter=parseInt(counter)+1;
}

localStorage.setItem("certificateCounter",counter);

const year=today.getFullYear();
const padded=String(counter).padStart(3,'0');

document.getElementById("certNumber").innerText=
"Zertifikat Nr: SD-"+year+"-"+padded;

/* FORM */

document.getElementById("certificateForm")
.addEventListener("submit", async function(e){

e.preventDefault();

const name=document.getElementById("childname").value;
const email=document.getElementById("email").value;

/* SEND EMAIL */

await fetch("https://formspree.io/f/mojnojer",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({
childname:name,
email:email
})

});

/* SHOW CERTIFICATE */

document.getElementById("formBox").style.display="none";

document.getElementById("childName").innerText=name;

document.getElementById("certificate").style.display="block";

document.getElementById("printBtn").style.display="block";

});

/* PRINT */

function printCertificate(){

window.print();

}

</script>

</body>

</html>
