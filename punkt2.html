<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width">
<link rel="stylesheet" href="style.css">
<title>Station 2</title>
</head>

<body>

<div class="overlay">

<div class="header">Station 2</div>

<div class="progress">
<div class="progress-bar" style="width:40%"></div>
</div>

<div class="card">

<p class="story">
Wo das Wasser am weitesten sichtbar ist,
wartet die nächste Prüfung.
</p>

<div class="didyouknow">

🧭 <b>Wusstest du, dass...</b><br><br>

Schwäne wählen normalerweise
einen einzigen Partner
für ihr ganzes Leben.

</div>

<button onclick="checkLocation(48.7660,11.4265,35)">
Standort prüfen
</button>

<p id="gpsResult"></p>

<div id="questionBox" class="hidden">

<p>Welche Farbe hat die Boje?</p>

<input id="answer">

<button onclick="checkAnswer('rot')">Antwort prüfen</button>

</div>

<div id="nextClue" class="hidden success">

Gut gemacht!

<a href="punkt3.html">
<button>Weiter</button>
</a>

</div>

</div>

</div>

<script src="game.js"></script>

<script>

function checkAnswer(){

if(document.getElementById("answer").value.toLowerCase()=="rot"){

document.getElementById("nextClue").classList.remove("hidden");

}else{

alert("Leider falsch");

}

}

</script>

</body>
</html>
